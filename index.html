<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI表情解析 Webアナライザー (Mobile v2.2)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* モバイルレイアウト：2/3を映像、1/3をデータに */
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        .video-section { 
            position: relative; 
            flex: 2; 
            background: #000; 
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ビデオ自体は画面にフィット */
        #webcam { width: 100%; height: 100%; object-fit: contain; }

        /* キャンバス：映像の実描画範囲にJSで重ねる */
        #overlay { 
            position: absolute; 
            pointer-events: none; 
            z-index: 50; 
            display: block;
        }

        .data-section { 
            flex: 1; 
            background: #0f172a;
            overflow-y: auto;
            padding: 1rem;
            border-top: 1px solid #1e293b;
            box-shadow: 0 -10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        
        .stat-card { background: #1e293b; padding: 0.6rem; border-radius: 8px; border-left: 3px solid #3b82f6; }
        
        .bar-bg { background: #334155; height: 8px; border-radius: 4px; margin-top: 4px; overflow: hidden; }
        .bar-fill { background: #3b82f6; height: 100%; width: 0%; transition: width 0.3s ease-out; }
        
        .loading-overlay { 
            position: fixed; inset: 0; background: #020617; 
            z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        
        .label-text { font-size: 0.65rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; }
        .value-text { font-size: 0.85rem; font-family: monospace; font-weight: bold; color: #38bdf8; }
    </style>
</head>
<body>

    <!-- 起動中画面 -->
    <div id="loading" class="loading-overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-cyan-500 mb-4"></div>
        <p class="text-lg font-bold text-cyan-400">AIシステム起動中...</p>
        <p class="text-xs text-slate-500">描画エンジンを同期しています</p>
    </div>

    <div class="app-container">
        <!-- 映像エリア (2/3) -->
        <section class="video-section">
            <video id="webcam" autoplay muted playsinline></video>
            <!-- 抽出点はここに描画される -->
            <canvas id="overlay"></canvas>
            
            <div class="absolute top-4 left-4 z-40 bg-black/40 px-2 py-1 rounded backdrop-blur">
                <span class="text-[10px] text-cyan-400 font-bold tracking-tighter">AI LANDMARK TRACKER</span>
            </div>

            <div id="error-msg" class="hidden absolute inset-0 flex items-center justify-center bg-slate-950/90 p-6 text-center z-[60]">
                <p class="text-red-400 text-sm font-bold">カメラ起動失敗<br>設定を確認してリロードしてください</p>
            </div>
        </section>

        <!-- UI解析エリア (1/3) -->
        <section class="data-section">
            <div class="flex justify-between items-end mb-3">
                <h2 class="text-[10px] font-black text-slate-500 tracking-widest">REALTIME EXPRESSIONS</h2>
                <span id="det-time" class="text-[9px] text-slate-500 font-mono">-- ms</span>
            </div>

            <!-- 感情メーター -->
            <div id="emotion-container" class="grid grid-cols-2 gap-x-3 gap-y-2 mb-4">
                <!-- JS生成 -->
            </div>

            <h2 class="text-[10px] font-black text-slate-500 tracking-widest mb-2">POSE & GAZE DATA</h2>
            <div class="grid grid-cols-2 gap-2">
                <div class="stat-card">
                    <span class="label-text">左右 (Yaw)</span>
                    <div id="val-yaw" class="value-text">-</div>
                </div>
                <div class="stat-card">
                    <span class="label-text">上下 (Pitch)</span>
                    <div id="val-pitch" class="value-text">-</div>
                </div>
                <div class="stat-card">
                    <span class="label-text">注目方向</span>
                    <div id="val-gaze" class="value-text text-emerald-400">-</div>
                </div>
                <div class="stat-card">
                    <span class="label-text">解析解像度</span>
                    <div id="res-info" class="text-[0.6rem] text-slate-400">-</div>
                </div>
            </div>
        </section>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('overlay');
        const loading = document.getElementById('loading');
        const emotionContainer = document.getElementById('emotion-container');

        const EMOTIONS = {
            neutral: '平常', happy: '喜び', sad: '悲しみ',
            angry: '怒り', fearful: '恐怖', disgusted: '嫌悪', surprised: '驚き'
        };

        const emotionElements = {};

        function initUI() {
            Object.keys(EMOTIONS).forEach(key => {
                const div = document.createElement('div');
                div.innerHTML = `
                    <div class="flex justify-between text-[9px] mb-0.5">
                        <span class="text-slate-400 font-bold">${EMOTIONS[key]}</span>
                        <span id="pct-${key}" class="text-cyan-400 font-mono">0%</span>
                    </div>
                    <div class="bar-bg">
                        <div id="bar-${key}" class="bar-fill"></div>
                    </div>
                `;
                emotionContainer.appendChild(div);
                emotionElements[key] = {
                    bar: document.getElementById(`bar-${key}`),
                    text: document.getElementById(`pct-${key}`)
                };
            });
        }

        async function loadModels() {
            const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            try {
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
                ]);
                startCamera();
            } catch (err) {
                loading.innerHTML = "<p class='text-red-500 p-4'>AIエンジンの読み込みに失敗しました</p>";
            }
        }

        async function startCamera() {
            const constraints = {
                video: { 
                    facingMode: "user",
                    width: { ideal: 640 }, 
                    height: { ideal: 480 } 
                }
            };
            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    loading.style.display = 'none';
                    updateLayout();
                };
            } catch (err) {
                document.getElementById('error-msg').classList.remove('hidden');
                loading.style.display = 'none';
            }
        }

        // ビデオの実際の表示サイズと位置を計算してキャンバスを重ねる
        function updateLayout() {
            if (!video.videoWidth) return null;

            const rect = video.getBoundingClientRect();
            const videoRatio = video.videoWidth / video.videoHeight;
            const containerRatio = rect.width / rect.height;

            let w, h, t, l;
            if (containerRatio > videoRatio) {
                h = rect.height;
                w = h * videoRatio;
                t = 0;
                l = (rect.width - w) / 2;
            } else {
                w = rect.width;
                h = w / videoRatio;
                l = 0;
                t = (rect.height - h) / 2;
            }

            // 内部解像度とCSSサイズを強制同期
            canvas.width = w;
            canvas.height = h;
            canvas.style.width = w + 'px';
            canvas.style.height = h + 'px';
            canvas.style.top = t + 'px';
            canvas.style.left = l + 'px';

            return { width: w, height: h };
        }

        video.addEventListener('play', () => {
            const loop = async () => {
                if (video.paused || video.ended) return;
                
                const displaySize = updateLayout();
                if (!displaySize) {
                    requestAnimationFrame(loop);
                    return;
                }

                const startTime = performance.now();
                
                // 顔検出
                const results = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.5 }))
                    .withFaceLandmarks()
                    .withFaceExpressions();

                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                if (results && results.length > 0) {
                    const resized = faceapi.resizeResults(results, displaySize);
                    const det = resized[0];

                    // --- ランドマークの描画 (確実に表示させるための自前ロジック) ---
                    const points = det.landmarks.positions;
                    ctx.fillStyle = '#00ff00'; // 蛍光グリーン
                    ctx.strokeStyle = '#00ff00';
                    ctx.lineWidth = 1.5;

                    // 1. 全ての点を描く
                    points.forEach(pt => {
                        ctx.beginPath();
                        ctx.arc(pt.x, pt.y, 1.8, 0, 2 * Math.PI);
                        ctx.fill();
                    });

                    // 2. 輪郭線を薄く繋ぐ (オプション)
                    ctx.globalAlpha = 0.4;
                    faceapi.draw.drawFaceLandmarks(canvas, resized);
                    ctx.globalAlpha = 1.0;

                    // --- 数値データの更新 ---
                    const exp = det.expressions;
                    Object.keys(EMOTIONS).forEach(key => {
                        const score = exp[key] || 0;
                        const pct = Math.round(score * 100);
                        emotionElements[key].bar.style.width = pct + '%';
                        emotionElements[key].text.innerText = pct + '%';
                        emotionElements[key].bar.style.backgroundColor = score > 0.5 ? '#10b981' : '#3b82f6';
                    });

                    updatePose(det.landmarks);
                    document.getElementById('res-info').innerText = `${video.videoWidth}x${video.videoHeight}`;
                }
                
                document.getElementById('det-time').innerText = `${Math.round(performance.now() - startTime)}ms`;
                requestAnimationFrame(loop);
            };
            loop();
        });

        function updatePose(landmarks) {
            const nose = landmarks.getNose()[0];
            const leftEye = landmarks.getLeftEye()[0];
            const rightEye = landmarks.getRightEye()[3];
            const midEyeX = (leftEye.x + rightEye.x) / 2;
            const midEyeY = (leftEye.y + rightEye.y) / 2;
            const faceWidth = rightEye.x - leftEye.x;

            const yaw = (nose.x - midEyeX) / faceWidth * 60;
            const pitch = (nose.y - midEyeY) / faceWidth * 100 - 50;

            document.getElementById('val-yaw').innerText = (yaw > 0 ? '+' : '') + yaw.toFixed(1) + '°';
            document.getElementById('val-pitch').innerText = (pitch > 0 ? '+' : '') + pitch.toFixed(1) + '°';
            
            let gaze = '正面';
            if (yaw > 12) gaze = '左方向'; else if (yaw < -12) gaze = '右方向';
            else if (pitch > 10) gaze = '下方'; else if (pitch < -10) gaze = '上方';
            document.getElementById('val-gaze').innerText = gaze;
        }

        initUI();
        loadModels();
        window.addEventListener('resize', updateLayout);
    </script>
</body>
</html>
